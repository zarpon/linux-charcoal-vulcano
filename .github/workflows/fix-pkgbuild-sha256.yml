name: Fix PKGBUILD SHA-256 checksums

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  fix-checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Calculate and commit checksums
        shell: bash
        run: |
          set -euo pipefail

          export CONFIG_SHA="$(sha256sum config-charcoal | awk '{print $1}')"
          export SCHED_SHA="$(curl --fail --silent --show-error --location 'https://raw.githubusercontent.com/firelzrd/bore-scheduler/69c9409354ad8be29280e97ceccb507d2c394be1/patches/additions/0002-sched-ext-coexistence-fix.patch' | sha256sum | awk '{print $1}')"

          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path('PKGBUILD')
          text = path.read_text(encoding='utf-8')
          match = re.search(r"sha256sums=\((.*?)\n\s*\)", text, flags=re.DOTALL)
          if not match:
              raise SystemExit('sha256sums array not found')

          block = match.group(1)
          tokens = list(re.finditer(r"'([^']*)'", block))
          if len(tokens) != 48:
              raise SystemExit(f'expected 48 checksum entries, found {len(tokens)}')

          if tokens[3].group(1) != 'SKIP':
              raise SystemExit(f'unexpected checksum at index 3: {tokens[3].group(1)}')
          if tokens[34].group(1) != 'SKIP':
              raise SystemExit(f'unexpected checksum at index 34: {tokens[34].group(1)}')

          for index, value in sorted({
              3: os.environ['CONFIG_SHA'],
              34: os.environ['SCHED_SHA'],
          }.items(), reverse=True):
              token = tokens[index]
              block = block[:token.start(1)] + value + block[token.end(1):]

          updated = text[:match.start(1)] + block + text[match.end(1):]
          path.write_text(updated, encoding='utf-8')
          PY

          git diff --check
          git diff -- PKGBUILD

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add PKGBUILD
          git commit -m 'Fix PKGBUILD source checksums'
          git push origin "HEAD:${{ github.head_ref }}"
