name: Export BORE port source

on:
  push:
    branches:
      - validation/bore-scheduler-port

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Fetch target kernel scheduler files
        run: |
          set -Eeuo pipefail
          git clone --depth 1 --branch 6.16.12-valve27 --filter=blob:none --sparse \
            https://github.com/evlaV/linux-integration.git kernel-source
          cd kernel-source
          git sparse-checkout set \
            include/linux/sched.h \
            init/Kconfig \
            kernel/Kconfig.hz \
            kernel/exit.c \
            kernel/fork.c \
            kernel/futex/waitwake.c \
            kernel/sched/Makefile \
            kernel/sched/core.c \
            kernel/sched/debug.c \
            kernel/sched/fair.c \
            kernel/sched/sched.h
          git checkout 6.16.12-valve27
          git rev-parse HEAD > ../kernel-source-commit.txt

      - name: Fetch current and historical BORE patches
        run: |
          set -Eeuo pipefail
          git clone https://github.com/firelzrd/bore-scheduler.git bore-upstream
          cp bore-upstream/patches/stable/linux-6.18-bore/0001-linux6.18.22-bore-6.6.3.patch \
            bore-6.18.22-6.6.3.patch
          git -C bore-upstream show \
            1921b881b4c7c859514a1dbab93af8035fd4e245:patches/stable/linux-6.16-bore/0001-linux6.16.0-bore-6.5.5.patch \
            > bore-6.16.0-6.5.5-reference.patch
          git -C bore-upstream rev-parse HEAD > bore-upstream-commit.txt
          sha256sum bore-*.patch > bore-patches.sha256

      - name: Package validation inputs
        run: |
          set -Eeuo pipefail
          tar -C kernel-source -czf bore-port-source.tar.gz \
            include/linux/sched.h \
            init/Kconfig \
            kernel/Kconfig.hz \
            kernel/exit.c \
            kernel/fork.c \
            kernel/futex/waitwake.c \
            kernel/sched/Makefile \
            kernel/sched/core.c \
            kernel/sched/debug.c \
            kernel/sched/fair.c \
            kernel/sched/sched.h

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: bore-port-inputs-6.16.12-valve27
          path: |
            bore-port-source.tar.gz
            kernel-source-commit.txt
            bore-6.18.22-6.6.3.patch
            bore-6.16.0-6.5.5-reference.patch
            bore-upstream-commit.txt
            bore-patches.sha256
          retention-days: 1
          if-no-files-found: error
