name: Validate patch source policy

on:
  pull_request:
    branches: [master]
    paths:
      - PKGBUILD
      - automation/patch-sources.json
      - automation/resolve-latest-patches.py
      - automation/validate-patch-lock.py
      - automation/port-poc-selector.py
      - automation/fix-libbpf-clang-warning.py
      - tests/test_patch_source_policy.py
      - tests/test_patch_lock_validation.py
      - tests/test_patch_poc_port.py
      - tests/test_patch_libbpf_clang.py
      - PATCH-SOURCES.md
      - .github/workflows/patch-source-policy.yml
      - .github/workflows/push.yml
  push:
    branches: [master]
    paths:
      - PKGBUILD
      - automation/patch-sources.json
      - automation/resolve-latest-patches.py
      - automation/validate-patch-lock.py
      - automation/port-poc-selector.py
      - automation/fix-libbpf-clang-warning.py
      - tests/test_patch_source_policy.py
      - tests/test_patch_lock_validation.py
      - tests/test_patch_poc_port.py
      - tests/test_patch_libbpf_clang.py
      - PATCH-SOURCES.md
      - .github/workflows/patch-source-policy.yml
      - .github/workflows/push.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  policy:
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Integrate libbpf Clang compatibility fix
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/track-all-upstream-patches'
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('PKGBUILD')
          text = path.read_text(encoding='utf-8')
          old = '''    if [[ $src == latest-poc-selector.patch ]]; then
              local adapted_poc="../${src%.patch}-valve-port.patch"
              python3 "$startdir/automation/port-poc-selector.py" \\
                "../$src" "$adapted_poc" kernel/sched/sched.h
              patch -Np1 < "$adapted_poc"
            else
              patch -Np1 < "../$src"
            fi
          '''
          new = '''    if [[ $src == latest-poc-selector.patch ]]; then
              local adapted_poc="../${src%.patch}-valve-port.patch"
              python3 "$startdir/automation/port-poc-selector.py" \\
                "../$src" "$adapted_poc" kernel/sched/sched.h
              patch -Np1 < "$adapted_poc"
            elif [[ $src == latest-libbpf-uninitialized.patch ]]; then
              patch -Np1 < "../$src"
              python3 "$startdir/automation/fix-libbpf-clang-warning.py" \\
                tools/lib/bpf/elf.c
            else
              patch -Np1 < "../$src"
            fi
          '''
          if new in text:
              raise SystemExit(0)
          if text.count(old) != 1:
              raise SystemExit('PKGBUILD compatibility block anchor changed')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name 'TurboDecky Patch Automation'
          git config user.email 'noreply@localhost'
          git add PKGBUILD
          if ! git diff --cached --quiet; then
            git diff --cached --check
            git commit -m 'build: keep libbpf GCC warning workaround out of Clang'
            git push origin HEAD:agent/track-all-upstream-patches
          fi

      - name: Validate resolver, lock policy and patch coverage
        run: |
          set -Eeuo pipefail
          mkdir -p logs
          python3 -m py_compile \
            automation/resolve-latest-patches.py \
            automation/validate-patch-lock.py \
            automation/port-poc-selector.py \
            automation/fix-libbpf-clang-warning.py \
            tests/test_patch_source_policy.py \
            tests/test_patch_lock_validation.py \
            tests/test_patch_poc_port.py \
            tests/test_patch_libbpf_clang.py
          python3 -m unittest discover -s tests -p 'test_patch*.py' -v \
            2>&1 | tee logs/patch-policy-tests.log

      - name: Resolve and validate every current upstream source
        run: |
          set -Eeuo pipefail
          python3 automation/resolve-latest-patches.py --write \
            2>&1 | tee logs/resolver.log
          python3 automation/validate-patch-lock.py \
            2>&1 | tee logs/patch-lock-validation.log
          bash -n PKGBUILD

      - name: Upload patch policy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-source-policy-${{ github.run_number }}
          path: logs
          if-no-files-found: warn
          retention-days: 7
