name: Build latest SteamOS Charcoal kernel

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: charcoal-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Configure zswap
        run: |
          echo zstd | sudo tee /sys/module/zswap/parameters/compressor
          echo 90 | sudo tee /sys/module/zswap/parameters/max_pool_percent
          echo 1 | sudo tee /sys/module/zswap/parameters/shrinker_enabled
          echo 1 | sudo tee /sys/module/zswap/parameters/enabled

      - name: Free runner space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Configure 16 GiB swap
        uses: pierotofy/set-swap-space@fc79b3f67fa8a838184ce84a674ca12238d2c761
        with:
          swap-size-gb: 16

      - name: Check out project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure ZIP packaging tool
        run: |
          if ! command -v zip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zip
          fi

      - name: Resolve latest compatible SteamOS patches
        run: |
          set -Eeuo pipefail
          mkdir -p logs
          python3 -m py_compile automation/resolve-latest-patches.py automation/finalize-pkgbuild-checksums.py
          python3 automation/resolve-latest-patches.py --write | tee logs/resolver.log
          bash -n PKGBUILD
          grep -Fq 'patches/testing/0001-linux6.16.12-lru_marie-' logs/patch-lock.json
          grep -Fq 'latest-adios.patch' PKGBUILD
          grep -Fq 'latest-bore.patch' PKGBUILD
          grep -Fq 'latest-lru_marie.patch' PKGBUILD
          grep -Fq 'latest-zram-ir.patch' PKGBUILD
          grep -Fq 'latest-poc-selector.patch' PKGBUILD
          grep -Fq 'latest-nap.patch' PKGBUILD

      - name: Build Docker image
        run: docker build . -t charcoal 2>&1 | tee logs/docker-build.log

      - name: Validate sources and build packages
        run: |
          set -Eeuo pipefail
          restore_workspace_owner() {
            local owner="$(id -u):$(id -g)"
            # Only host-side control paths need to be writable after the
            # container exits. Avoid traversing the complete kernel tree.
            sudo chown "$owner" "$PWD" || true
            sudo chown -R "$owner" "$PWD/logs" "$PWD/.git" 2>/dev/null || true
          }
          trap restore_workspace_owner EXIT

          # makepkg must run as an unprivileged user and must be able to create
          # src/pkg below /project. Restore the complete workspace afterwards,
          # including .git, for host-side packaging and release operations.
          docker run --rm -v "$PWD:/project" charcoal chown -R nobody /project
          docker run --rm -v "$PWD:/project" charcoal sudo -u nobody bash -lc '
            set -Eeuo pipefail
            cd /project

            # Fetch sources once. The resolver lock records the SHA-256 of every
            # dynamically materialized patch. No patch is applied at this stage.
            makepkg --verifysource 2>&1 | tee logs/verifysource-bootstrap.log

            # Generate checksums from the exact downloaded bytes and rewrite the
            # PKGBUILD. SKIP is permitted only for pinned VCS sources.
            makepkg -g > logs/generated-sha256sums.txt
            python3 automation/finalize-pkgbuild-checksums.py \
              --generated logs/generated-sha256sums.txt \
              --report logs/checksum-validation.txt
            bash -n PKGBUILD

            # Verify again, now against real SHA-256 values, before prepare/build.
            makepkg --verifysource 2>&1 | tee logs/verifysource.log
            makepkg -Ccf --noconfirm 2>&1 | tee logs/makepkg.log
          '
          # The container created logs as nobody; host-side post-processing
          # must be able to create checksums, the ZIP and release notes.
          restore_workspace_owner
          trap - EXIT
          compgen -G 'linux-charcoal-*.pkg.tar.zst' >/dev/null
          sha256sum linux-charcoal-*.pkg.tar.zst | tee logs/SHA256SUMS
          PKGVER="$(bash -c 'source PKGBUILD; printf "%s" "$pkgver"')"
          KERNEL_TAG="$(bash -c 'source PKGBUILD; printf "%s" "$_tag"')"
          echo "PKGVER=$PKGVER" >> "$GITHUB_ENV"
          echo "KERNEL_TAG=$KERNEL_TAG" >> "$GITHUB_ENV"
          RELEASE_TAG="charcoal-${PKGVER}-r${GITHUB_RUN_NUMBER}"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          RELEASE_ZIP="linux-charcoal-${PKGVER}-r${GITHUB_RUN_NUMBER}.zip"
          echo "RELEASE_ZIP=$RELEASE_ZIP" >> "$GITHUB_ENV"

      - name: Generate release description
        run: |
          set -Eeuo pipefail
          previous=""
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            previous="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName 2>/dev/null || true)"
          fi
          {
            echo "# Charcoal SteamOS kernel ${PKGVER}"
            echo
            echo "Built from the latest stable SteamOS 6.16 tag: \`${KERNEL_TAG}\`."
            echo
            echo "## Updates"
            python3 - <<'PY'
          import json

          with open("logs/patch-lock.json", encoding="utf-8") as handle:
              lock = json.load(handle)

          for name, item in lock["components"].items():
              origin = item.get("origin", "unknown")
              path = item.get("path", "unknown")
              commit = item.get("commit", "unknown")
              if origin == "local-port":
                  detail = f"6.16.12 local port ({path})"
              else:
                  detail = f"latest compatible upstream patch ({path})"
              print(f"- **{name}**: {detail}; source commit `{commit}`.")
          PY
            echo
            echo "## Artifacts"
            echo "- Kernel package ZIP: \`${RELEASE_ZIP}\`"
            echo "- Kernel source: \`${KERNEL_TAG}\`"
            echo
            echo "## Changes in the repository"
            if [[ -n "$previous" ]]; then
              git log --pretty='- %s (%h)' "$previous"..HEAD
            else
              git log -20 --pretty='- %s (%h)'
            fi
          } > logs/release-notes.md

      - name: Assemble kernel release ZIP
        run: |
          set -Eeuo pipefail
          mkdir -p release
          cp linux-charcoal-*.pkg.tar.zst release/
          cp logs/patch-lock.json logs/checksum-validation.txt logs/SHA256SUMS logs/release-notes.md release/
          cat > release/README.md <<EOF
          # Charcoal SteamOS kernel ${KERNEL_TAG}

          This archive contains the compiled Charcoal kernel packages for SteamOS.

          Install on SteamOS with:

              sudo steamos-readonly disable
              sudo pacman -U linux-charcoal-*.pkg.tar.zst
              sudo steamos-readonly enable

          The archive also contains the exact patch lock, SHA-256 checksums and build
          description used for this release.
          EOF
          (cd release && zip -9 -q "../${RELEASE_ZIP}" ./*)
          sha256sum "${RELEASE_ZIP}" | tee logs/RELEASE-ZIP-SHA256SUM

      - name: Upload test artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: linux-charcoal-${{ env.PKGVER }}
          path: |
            linux-charcoal-*.pkg.tar.zst
            ${{ env.RELEASE_ZIP }}
            logs/patch-lock.json
            logs/checksum-validation.txt
            logs/SHA256SUMS
            logs/RELEASE-ZIP-SHA256SUM
            logs/release-notes.md
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref_name == 'master'
        run: |
          set -Eeuo pipefail
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "${RELEASE_ZIP}" \
            logs/RELEASE-ZIP-SHA256SUM \
            linux-charcoal-*.pkg.tar.zst \
            --title "$RELEASE_TAG" \
            --notes-file logs/release-notes.md \
            --verify-tag

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charcoal-validation-${{ github.run_number }}
          path: logs
          if-no-files-found: warn
          retention-days: 30
