name: Build latest SteamOS Charcoal kernel

on:
  push:
    branches:
      - master
      - test/dynamic-latest-patches-release
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: charcoal-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Configure zswap
        run: |
          echo zstd | sudo tee /sys/module/zswap/parameters/compressor
          echo 90 | sudo tee /sys/module/zswap/parameters/max_pool_percent
          echo 1 | sudo tee /sys/module/zswap/parameters/shrinker_enabled
          echo 1 | sudo tee /sys/module/zswap/parameters/enabled

      - name: Free runner space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Configure 16 GiB swap
        uses: pierotofy/set-swap-space@fc79b3f67fa8a838184ce84a674ca12238d2c761
        with:
          swap-size-gb: 16

      - name: Check out project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest compatible SteamOS patches
        run: |
          set -Eeuo pipefail
          mkdir -p logs
          python3 automation/resolve-latest-patches.py --write
          python3 -m py_compile automation/resolve-latest-patches.py
          bash -n PKGBUILD
          grep -Fq '"kernel"' logs/patch-lock.json
          grep -Fq 'latest-adios.patch' PKGBUILD
          grep -Fq 'latest-bore.patch' PKGBUILD
          grep -Fq 'latest-lru_marie.patch' PKGBUILD
          grep -Fq 'latest-zram-ir.patch' PKGBUILD
          grep -Fq 'latest-poc-selector.patch' PKGBUILD
          grep -Fq 'latest-nap.patch' PKGBUILD

      - name: Build Docker image
        run: docker build . -t charcoal

      - name: Validate sources and build packages
        run: |
          set -Eeuo pipefail
          docker run --rm -v "$PWD:/project" charcoal chown -R nobody /project
          docker run --rm -v "$PWD:/project" charcoal sudo -u nobody bash -lc '
            cd /project
            makepkg --verifysource
            makepkg -Ccf --noconfirm
          '
          compgen -G 'linux-charcoal-*.pkg.tar.zst' >/dev/null
          sha256sum linux-charcoal-*.pkg.tar.zst | tee logs/SHA256SUMS
          PKGVER="$(bash -c 'source PKGBUILD; printf "%s" "$pkgver"')"
          echo "PKGVER=$PKGVER" >> "$GITHUB_ENV"
          RELEASE_TAG="charcoal-${PKGVER}-r${GITHUB_RUN_NUMBER}"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Upload test artifacts
        if: github.ref_name != 'master'
        uses: actions/upload-artifact@v4
        with:
          name: linux-charcoal-${{ env.PKGVER }}
          path: |
            linux-charcoal-*.pkg.tar.zst
            logs/patch-lock.json
            logs/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

      - name: Generate release notes
        if: github.event_name == 'push' && github.ref_name == 'master'
        run: |
          set -Eeuo pipefail
          previous="$(gh release view --json tagName -q .tagName 2>/dev/null || true)"
          {
            echo "# Charcoal SteamOS kernel ${PKGVER}"
            echo
            echo "Built from the newest compatible Valve SteamOS tag and dynamically resolved patch streams."
            echo
            echo '## Patch lock'
            echo '```json'
            cat logs/patch-lock.json
            echo '```'
            echo
            echo '## Changes'
            if [[ -n "$previous" ]]; then
              git log --pretty='- %s (%h)' "$previous"..HEAD
            else
              git log -20 --pretty='- %s (%h)'
            fi
          } > logs/release-notes.md

      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref_name == 'master'
        run: |
          set -Eeuo pipefail
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            linux-charcoal-*.pkg.tar.zst \
            logs/patch-lock.json \
            logs/SHA256SUMS \
            --title "$RELEASE_TAG" \
            --notes-file logs/release-notes.md \
            --verify-tag

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charcoal-validation-${{ github.run_number }}
          path: logs
          if-no-files-found: warn
          retention-days: 30
