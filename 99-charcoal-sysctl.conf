# Charcoal memory and latency defaults for SteamOS handhelds.
vm.swappiness=1
vm.page-cluster=0
vm.min_free_kbytes=262144
vm.compaction_proactiveness=15
vm.dirty_expire_centisecs=3500
vm.dirty_writeback_centisecs=500
vm.watermark_boost_factor=0
vm.watermark_scale_factor=125
kernel.split_lock_mitigate=0
vm.dirty_background_bytes=209715200
vm.dirty_bytes=409430400
vm.vfs_cache_pressure=125

# ZRAM-IR registers this only after the zram module loads. The '-' makes the
# early systemd-sysctl pass non-fatal; the udev helper reasserts it per device.
-vm.zram_recomp_immediate=1
